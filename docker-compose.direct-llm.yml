services:
  moviepilot-ai-recognizer-gateway:
    image: liuyuexi/moviepilot-ai-recognizer-gateway:2.0.0-alpha.2
    container_name: moviepilot-ai-recognizer-gateway
    environment:
      PORT: "9000"
      # 小白推荐：直接写 MoviePilot 宿主机内网地址和外部端口
      # 例如：http://192.168.1.10:3000
      # 如果你熟悉 Docker 网络，也可以改成同网络容器名
      # 例如：http://moviepilot-v2:3001
      # 不推荐：http://127.0.0.1:3001
      MP_BASE_URL: "http://192.168.x.x:3000"
      MP_API_KEY: "replace_with_moviepilot_api_key"
      RECOGNIZER_MODE: "direct_llm"
      LLM_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      LLM_API_KEY: "replace_with_llm_api_key"
      LLM_MODEL: "qwen-plus" # 推荐先用 qwen-plus
      LLM_TEMPERATURE: "0.1" # 温度越低越保守，越容易稳定输出 JSON；不懂就保持 0.1
      LLM_ENABLE_THINKING: "false" # 推荐保持 false，稳定输出 JSON
      TMDB_API_KEY: "replace_with_tmdb_api_key"
      RECOGNIZER_TIMEOUT_MS: "60000"
    ports:
      - "9000:9000"
    restart: unless-stopped
    networks:
      - moviepilot

networks:
  moviepilot:
    external: true
    name: moviepilot
